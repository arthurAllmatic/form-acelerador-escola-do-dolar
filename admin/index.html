<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Painel · Escola do Dólar — Acelerador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--ink:#1a1620;--muted:#6a6470;--line:#e9e7ea;
    --gold:#b8860b;--gold-deep:#8a6a2c;--gold-soft:#faf4e4;--gold-line:#ecdcaf;
    --grad:linear-gradient(135deg,#8a6a2c,#caa64e 45%,#a6791f);
    --green:#2e7d32;--green-soft:#e8f3e9;
    --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:#fbfaf8;color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100dvh}
  .b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ital{font-style:italic}

  .wrap{max-width:1080px;margin:0 auto;padding:32px 24px 60px}

  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px}
  .eyebrow{display:flex;align-items:center;gap:12px;font:600 12px Inter;letter-spacing:3px;
    text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
  .eyebrow::before{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  h1{font:400 clamp(28px,4.5vw,38px)/1.1 var(--serif)}
  .sync{font:500 12.5px Inter;color:var(--muted);display:flex;align-items:center;gap:8px}
  .sync .dotp{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  .sync.err .dotp{background:#c0392b;animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .refreshbtn{background:none;border:1.5px solid var(--line);border-radius:20px;padding:7px 16px;
    font:600 12.5px Inter;color:var(--muted);cursor:pointer;transition:.16s}
  .refreshbtn:hover{border-color:var(--gold);color:var(--gold-deep)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:26px}
  .card{border:1.5px solid var(--line);border-radius:18px;background:#fff;padding:20px 22px;cursor:pointer;
    transition:.18s;text-align:left}
  .card:hover{border-color:var(--gold-line)}
  .card.on{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 10px 26px -18px rgba(184,134,11,.6)}
  .card h3{font:400 20px var(--serif);margin-bottom:2px}
  .card .fasetag{font:600 10.5px Inter;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
  .card .total{font:400 40px/1 var(--serif);margin:8px 0 12px}
  .card .total small{font:500 13px Inter;color:var(--muted);letter-spacing:.3px}
  .brk{display:flex;flex-wrap:wrap;gap:6px}
  .brk span{font:600 11.5px Inter;padding:4px 10px;border-radius:12px;letter-spacing:.2px}
  .bk-novo{background:#f0eef2;color:#5b5563}
  .bk-and{background:var(--gold-soft);color:var(--gold-deep);border:1px solid var(--gold-line)}
  .card.on .bk-and{background:#fff}
  .bk-done{background:var(--green-soft);color:var(--green)}

  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .search{flex:1;min-width:240px;position:relative}
  .search input{width:100%;border:1.5px solid var(--line);border-radius:14px;background:#fff;
    padding:13px 16px 13px 42px;font:500 15px Inter;color:var(--ink);outline:none;transition:.18s}
  .search input::placeholder{color:#b6bcc6}
  .search input:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
  .search::before{content:"⌕";position:absolute;left:15px;top:50%;transform:translateY(-54%);font-size:20px;color:#b6bcc6}
  .filterinfo{font:500 13px Inter;color:var(--muted)}
  .filterinfo b{color:var(--gold-deep)}
  .clearf{background:none;border:none;color:var(--gold-deep);font:600 13px Inter;cursor:pointer;text-decoration:underline}

  .list{border:1.5px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}
  .lrow{border-bottom:1px solid var(--line)}
  .lrow:last-child{border-bottom:none}
  .lhead,.lmain{display:grid;grid-template-columns:1.2fr 1.4fr 1.7fr .6fr;gap:14px;align-items:center;padding:14px 20px}
  .lhead{font:600 11px Inter;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    border-bottom:1.5px solid var(--line);background:#fcfbf9}
  .lmain{cursor:pointer;transition:.14s}
  .lmain:hover{background:var(--gold-soft)}
  .lrow.open .lmain{background:var(--gold-soft)}
  .lnome{font:600 15px Inter;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lnome .anon{color:#b3b0ba;font-weight:500;font-style:italic}
  .lcontato{font:500 13px Inter;color:var(--muted);line-height:1.45;overflow:hidden}
  .lcontato div{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lform{font:600 12.5px Inter;color:var(--gold-deep)}
  .lform small{display:block;font:500 11px Inter;color:#b3b0ba;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .st{display:inline-flex;align-items:center;gap:7px;font:600 12px Inter;padding:5px 12px;border-radius:14px}
  .st::before{content:"";width:7px;height:7px;border-radius:50%}
  .st-novo{background:#f0eef2;color:#5b5563}.st-novo::before{background:#8f8a99}
  .st-and{background:var(--gold-soft);color:var(--gold-deep);border:1px solid var(--gold-line)}.st-and::before{background:var(--gold)}
  .st-done{background:var(--green-soft);color:var(--green)}.st-done::before{background:var(--green)}
  .setapa{display:block;font:500 11.5px Inter;color:var(--muted);margin-top:5px}
  .ltime{font:500 12.5px Inter;color:var(--muted);text-align:right}
  .etapas{display:flex;flex-direction:column;gap:5px;align-items:flex-start}
  .etsec{margin-top:14px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff}
  .ethead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .ethead b{font:600 14px Inter;color:var(--ink)}
  .ettime{font:500 12px Inter;color:var(--muted);margin-left:auto}

  .ldet{display:none;padding:6px 20px 20px;background:#fefdfb;border-top:1px dashed var(--gold-line)}
  .lrow.open .ldet{display:block;animation:in .25s ease}
  @keyframes in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .ldet h4{font:600 11px Inter;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep);margin:16px 0 10px}
  .resp{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .rit{border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px 14px}
  .rit b{display:block;font:600 10.5px Inter;letter-spacing:1.2px;text-transform:uppercase;color:#a09a8a;margin-bottom:4px}
  .rit span{font:500 14px/1.45 Inter;color:var(--ink);word-break:break-word;white-space:pre-wrap}
  .logoprev{max-width:180px;max-height:120px;object-fit:contain;border:1.5px solid var(--line);
    border-radius:12px;background:#fff;padding:8px;display:block}
  .verlogo{display:inline-block;margin-top:10px;font:700 13px Inter;color:var(--gold-deep);
    border:1.5px solid var(--gold-line);background:var(--gold-soft);border-radius:20px;
    padding:8px 16px;text-decoration:none;transition:.16s}
  .verlogo:hover{border-color:var(--gold)}
  .rit.alertaerr{border-color:#f0c2bd;background:#fdf1f0}
  .rit.alertaerr b{color:#b3261e}
  .rit.alertaerr span{color:#7a2018;font:500 13.5px/1.5 Inter}
  .errdata{display:block;margin-top:6px;font:500 11.5px Inter;color:#b08681}
  .regen{margin-top:4px;font:700 13px Inter;color:var(--gold-deep);border:1.5px solid var(--gold-line);
    background:var(--gold-soft);border-radius:20px;padding:9px 16px;cursor:pointer;transition:.16s}
  .regen:hover{border-color:var(--gold)}
  .regen:disabled{opacity:.6;cursor:default}
  .regenmsg{display:block;margin-top:8px;font:500 12.5px Inter;color:var(--muted)}
  .regenmsg.ok{color:var(--green)} .regenmsg.err{color:#b3261e}

  /* Estúdio da logo */
  .rit.estudio{background:#fdfbf6;border-color:var(--gold-line)}
  .chatbox{margin:10px 0 0;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto}
  .chatvazio{font:500 13px Inter;color:var(--muted);padding:6px 0}
  .msg{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:10px 12px}
  .msg .msgn{flex:none;width:20px;height:20px;border-radius:50%;background:var(--gold-soft);
    border:1px solid var(--gold-line);color:var(--gold-deep);font:700 11px Inter;
    display:flex;align-items:center;justify-content:center}
  .msg p{font:500 13.5px/1.45 Inter;color:var(--ink);margin:0}
  .msg small{font:500 11px Inter;color:#b3b0ba}
  .msg>div{flex:1}
  .msgdel{flex:none;background:none;border:none;color:#c9c5cf;font:700 16px Inter;cursor:pointer;line-height:1;padding:0 2px}
  .msgdel:hover{color:#b3261e}
  .chatnew{display:flex;gap:8px;margin-top:10px;align-items:flex-start}
  .chatinput{flex:1;border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px;
    font:500 13.5px/1.4 Inter;color:var(--ink);outline:none;resize:vertical}
  .chatinput:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
  .chatadd{flex:none;font:700 12.5px Inter;color:var(--gold-deep);border:1.5px solid var(--gold-line);
    background:var(--gold-soft);border-radius:20px;padding:10px 14px;cursor:pointer;transition:.16s}
  .chatadd:hover{border-color:var(--gold)}
  .campos{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:14px}
  .fl{display:flex;flex-direction:column;gap:4px}
  .fl b{font:600 10.5px Inter;letter-spacing:1.2px;text-transform:uppercase;color:#a09a8a}
  .fed{border:1.5px solid var(--line);border-radius:10px;background:#fff;padding:8px 10px;
    font:500 13.5px Inter;color:var(--ink);outline:none;transition:.16s;width:100%;resize:vertical}
  .fed:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
  .fed.salvo{border-color:var(--green);background:var(--green-soft)}
  .fed.erro{border-color:#b3261e}
  .estudioacoes{margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .estudioacoes .regenmsg{margin-top:0}
  .histbox{margin-top:14px;border-top:1px dashed var(--gold-line);padding-top:10px}
  .histbox summary{font:600 12.5px Inter;color:var(--gold-deep);cursor:pointer}
  .histlist{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .histit{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}
  .histit img{width:64px;height:64px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;flex:none}
  .histit b{font:600 13px Inter} .histit small{font:500 11px Inter;color:#b3b0ba;margin-left:6px}
  .hajus{font:500 12px/1.4 Inter;color:var(--muted);margin:4px 0 4px}
  .histit a{font:600 12px Inter;color:var(--gold-deep)}
  .lid{font:500 10.5px "SF Mono",Menlo,monospace;color:#c4c0cb;margin-top:14px;word-break:break-all}

  .empty{padding:56px 20px;text-align:center}
  .empty .big{font:400 24px var(--serif);margin-bottom:8px}
  .empty p{font:500 14px Inter;color:var(--muted)}
  .warn{border:1.5px solid var(--gold-line);background:var(--gold-soft);border-radius:14px;padding:16px 20px;
    font:500 14px/1.55 Inter;color:var(--gold-deep);margin-bottom:22px}
  .warn code{font:600 12.5px "SF Mono",Menlo,monospace;background:#fff;padding:2px 7px;border-radius:6px}

  @media (max-width:760px){
    .lhead{display:none}
    .lmain{grid-template-columns:1fr auto;gap:6px 12px;padding:14px 16px}
    .lcontato{grid-column:1}
    .etapas{grid-column:1}
    .ltime{grid-row:1;grid-column:2;text-align:right}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="eyebrow">Acelerador · Área interna</div>
      <h1>Painel de <span class="b ital">leads</span></h1>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="sync" id="sync"><span class="dotp"></span><span id="synctxt">carregando…</span></div>
      <button class="refreshbtn" id="refresh">↻ Atualizar</button>
    </div>
  </header>

  <div id="cfgwarn" class="warn" style="display:none">
    ⚠️ Configure o Supabase: preencha <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no topo do
    <code>&lt;script&gt;</code> deste arquivo (<code>admin/index.html</code>).
  </div>

  <div class="cards" id="cards"></div>

  <div class="toolbar">
    <div class="search"><input id="q" type="search" placeholder="Buscar por nome, e-mail ou WhatsApp…" autocomplete="off"></div>
    <div class="filterinfo" id="finfo"></div>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
/* ===== SUPABASE (config única — preencher com as credenciais do projeto) ===== */
const SUPABASE_URL="https://wiktreeseddzzhbsbwkz.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpa3RyZWVzZWRkenpoYnNid2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5NDkwMDgsImV4cCI6MjA3NzUyNTAwOH0.U-X9n-SK0zLC7ZU_RBXYvXjRpLTnOAqTWJxMOmY5JFk";

const REFRESH_MS=15000;

const FORMS={
  reconhecimento:{label:"Reconhecimento",fase:"Fase 1"},
  briefing_logo:{label:"Sua Logo",fase:"Fase 2"},
  entrega_logo:{label:"Logo & Resgate",fase:"Fase 3"},
  instalar_tema:{label:"Instalar Tema",fase:"Sobe Tema"}
};
// Forms mortos/descontinuados — ignorados por completo no painel.
const FORMS_IGNORAR=new Set(["como_vai_receber"]);
const ST={
  novo_lead:{label:"Começou",cls:"novo"},
  em_andamento:{label:"Preenchendo",cls:"and"},
  concluido:{label:"Concluído",cls:"done"}
};
const RESP_LABELS={
  categoria:"Nicho",nicho:"Nicho",motivo:"Motivo",motivo_outro:"Outro motivo",obs:"Observações",
  experiencia:"Experiência",ja_vendeu:"Já vendeu online",disponibilidade:"Disponibilidade",
  horas_por_semana:"Horas por semana",o_que_trava:"O que trava",duvida:"Dúvida",
  tudo_tranquilo:"Tudo tranquilo",o_que_pesou:"O que pesou",nome_loja:"Nome da loja",
  tem_logo:"Já tem logo",logo_arquivo:"Arquivo da logo",logo_mime:"Tipo do arquivo",
  estilo:"Estilo",cor:"Cor principal",cor_loja:"Cores da loja",cor_logo:"Cor da logo",
  conta_mais:"Conta mais",sensacao:"Sensação",lead_id_origem:"Lead de origem",
  logo_prompt:"Prompt da logo (IA)",
  loja_shopify:"Loja Shopify",tema_instalado:"Tema instalado",ultimo_erro:"Último erro",
  pais:"País",produto:"Produto",idioma:"Idioma",cor:"Cor aplicada",
  banner:"Banner aplicado",banner_fallback:"Banner (fallback)",logo:"Logo aplicada",cores:"Cores aplicadas",
  builder_link:"Link do builder",logo_baixada:"Baixou a logo",resgatou:"Resgatou a loja"
};

let leads=[], filtroForm=null, busca="", aberto=new Set(), timer=null;

const $=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function rel(iso){
  if(!iso) return "—";
  const d=new Date(iso), diff=(Date.now()-d.getTime())/1000;
  if(diff<60) return "agora";
  if(diff<3600) return Math.floor(diff/60)+" min";
  if(diff<86400) return Math.floor(diff/3600)+" h";
  if(diff<7*86400) return Math.floor(diff/86400)+" d";
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
}

async function load(manual){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY){
    $("cfgwarn").style.display="block";
    $("synctxt").textContent="sem conexão";$("sync").classList.add("err");
    draw();return;
  }
  try{
    if(manual) $("synctxt").textContent="atualizando…";
    const r=await fetch(SUPABASE_URL+"/rest/v1/leads?select=*&order=atualizado_em.desc",{
      headers:{apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    leads=(await r.json()).filter(l=>!FORMS_IGNORAR.has(l.formulario));
    $("sync").classList.remove("err");
    $("synctxt").textContent="atualizado às "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }catch(e){
    $("sync").classList.add("err");
    $("synctxt").textContent="erro ao carregar ("+e.message+")";
  }
  draw();
}

function grupos(){
  // Conta PESSOAS (agrupadas por e-mail), não registros brutos — bate com a lista.
  // Cada pessoa entra uma vez por formulário, com o status mais recente dela nesse form.
  const g={};
  for(const k of Object.keys(FORMS)) g[k]={total:0,novo_lead:0,em_andamento:0,concluido:0};
  for(const grp of agrupar(leads)){
    for(const f of Object.keys(grp.porForm)){
      if(!g[f]) g[f]={total:0,novo_lead:0,em_andamento:0,concluido:0};
      const l=grp.porForm[f];
      g[f].total++;
      if(g[f][l.status]!==undefined) g[f][l.status]++;
    }
  }
  return g;
}

const ORDEM_FORMS={reconhecimento:1,briefing_logo:2,entrega_logo:3,como_vai_receber:3,instalar_tema:4};

/* Agrupa por e-mail: uma pessoa = uma linha; cada etapa vira histórico dentro dela.
   Se houver mais de um registro da mesma etapa pro mesmo e-mail, mostra o mais recente. */
function agrupar(list){
  const map=new Map();
  for(const l of list){
    const key=(l.email||"").trim().toLowerCase()||("__sem_email__"+l.id);
    if(!map.has(key)) map.set(key,{key,nome:"",email:"",whatsapp:"",porForm:{},atualizado_em:l.atualizado_em});
    const g=map.get(key);
    if(!g.nome&&l.nome) g.nome=l.nome;
    if(!g.email&&l.email) g.email=l.email;
    if(!g.whatsapp&&l.whatsapp) g.whatsapp=l.whatsapp;
    if(new Date(l.atualizado_em||0)>new Date(g.atualizado_em||0)) g.atualizado_em=l.atualizado_em;
    const f=l.formulario||"outro";
    const atual=g.porForm[f];
    if(!atual||new Date(l.atualizado_em||0)>new Date(atual.atualizado_em||0)) g.porForm[f]=l;
  }
  return [...map.values()].sort((a,b)=>new Date(b.atualizado_em||0)-new Date(a.atualizado_em||0));
}

function formsDoGrupo(g){
  return Object.keys(g.porForm).sort((a,b)=>(ORDEM_FORMS[a]||9)-(ORDEM_FORMS[b]||9));
}

function filtrados(){
  const q=busca.trim().toLowerCase();
  return agrupar(leads).filter(g=>{
    if(filtroForm&&!g.porForm[filtroForm]) return false;
    if(!q) return true;
    return [g.nome,g.email,g.whatsapp].some(v=>(v||"").toLowerCase().includes(q));
  });
}

function drawCards(){
  const g=grupos();
  const keys=[...Object.keys(FORMS),...Object.keys(g).filter(k=>!FORMS[k])];
  $("cards").innerHTML=keys.map(k=>{
    const info=FORMS[k]||{label:k,fase:"—"}, d=g[k]||{total:0,novo_lead:0,em_andamento:0,concluido:0};
    return `<button class="card ${filtroForm===k?'on':''}" data-f="${esc(k)}">
      <div class="fasetag">${esc(info.fase)}</div>
      <h3>${esc(info.label)}</h3>
      <div class="total">${d.total} <small>lead${d.total===1?"":"s"}</small></div>
      <div class="brk">
        <span class="bk-novo">${d.novo_lead} começou</span>
        <span class="bk-and">${d.em_andamento} preenchendo</span>
        <span class="bk-done">${d.concluido} concluído${d.concluido===1?"":"s"}</span>
      </div>
    </button>`;
  }).join("");
  $("cards").querySelectorAll(".card").forEach(c=>{
    c.onclick=()=>{filtroForm=(filtroForm===c.dataset.f?null:c.dataset.f);draw();};
  });
}

function respHTML(l){
  const r=l.respostas||{};
  let logo="", gerada="", alerta="", regerar="";

  // Alerta de erro na geração da logo (só aparece quando falhou)
  if(r.logo_erro){
    alerta=`<div class="rit alertaerr" style="grid-column:1/-1"><b>⚠️ Erro ao gerar a logo</b>
      <span>${esc(r.logo_erro)}</span>
      ${r.logo_erro_em?`<small class="errdata">${new Date(r.logo_erro_em).toLocaleString("pt-BR")}</small>`:""}</div>`;
  }
  // Estúdio da logo — só na Fase 2 (briefing) de quem pediu logo pra equipe
  if(l.formulario==="briefing_logo" && r.tem_logo!=="Já tenho a minha"){
    const chat=Array.isArray(r.logo_chat)?r.logo_chat:[];
    const msgs=chat.length
      ? chat.map((m,i)=>`<div class="msg"><span class="msgn">${i+1}</span><div><p>${esc(m.texto)}</p>
          <small>${m.em?new Date(m.em).toLocaleString("pt-BR"):""}</small></div>
          <button class="msgdel" data-lead="${esc(l.id)}" data-i="${i}" title="Remover ajuste">×</button></div>`).join("")
      : `<p class="chatvazio">Nenhum ajuste pedido ainda. Escreva abaixo o que o aluno quer mudar.</p>`;

    const campo=(k,label,tipo)=>{
      const v=Array.isArray(r[k])?r[k].join(", "):(r[k]||"");
      return tipo==="area"
        ? `<label class="fl"><b>${label}</b><textarea class="fed" data-lead="${esc(l.id)}" data-k="${k}" rows="2">${esc(v)}</textarea></label>`
        : `<label class="fl"><b>${label}</b><input class="fed" data-lead="${esc(l.id)}" data-k="${k}" value="${esc(v)}"></label>`;
    };

    const hist=Array.isArray(r.logo_historico)?r.logo_historico:[];
    const histHtml=hist.length>1
      ? `<details class="histbox"><summary>Histórico de gerações (${hist.length})</summary>
          <div class="histlist">${hist.slice().reverse().map((h,i)=>`
            <div class="histit">
              <img src="${esc(h.url)}" alt="v${hist.length-i}">
              <div><b>v${hist.length-i}</b> <small>${h.em?new Date(h.em).toLocaleString("pt-BR"):""}</small>
                ${h.ajustes&&h.ajustes.length?`<p class="hajus">Ajustes: ${esc(h.ajustes.join(" · "))}</p>`:`<p class="hajus">Sem ajustes (1ª versão)</p>`}
                <a href="${esc(h.url)}" target="_blank" rel="noopener">abrir ↗</a></div>
            </div>`).join("")}</div></details>`
      : "";

    regerar=`<div class="rit estudio" style="grid-column:1/-1">
      <b>🎨 Estúdio da logo</b>
      <div class="chatbox">${msgs}</div>
      <div class="chatnew">
        <textarea class="chatinput" id="ci-${esc(l.id)}" rows="2" placeholder="O que o aluno pediu pra mudar? Ex: tirar a folha, deixar mais minimalista, fonte mais grossa…"></textarea>
        <button class="chatadd" data-lead="${esc(l.id)}">+ Adicionar ajuste</button>
      </div>
      <div class="campos">${campo("nome_loja","Nome da loja")}${campo("estilo","Estilo")}${campo("cor_logo","Cor da logo")}${campo("cor_loja","Cores da loja")}${campo("sensacao","Sensação")}${campo("conta_mais","Conta mais","area")}</div>
      <div class="estudioacoes">
        <button class="regen" data-lead="${esc(l.id)}">${r.logo_gerada_url?"↻ Gerar logo de novo":"✨ Gerar logo agora"}</button>
        <span class="regenmsg" id="rg-${esc(l.id)}"></span>
      </div>
      ${histHtml}</div>`;
  }
  if(r.logo_base64){
    const src=String(r.logo_base64).startsWith("data:")?r.logo_base64:
      "data:"+(r.logo_mime||"image/png")+";base64,"+r.logo_base64;
    logo=`<div class="rit" style="grid-column:1/-1"><b>Logo enviada</b><img class="logoprev" src="${src.replace(/"/g,'&quot;')}" alt="logo"></div>`;
  }
  if(r.logo_gerada_url||r.logo_gerada_base64){
    const buster=r.logo_gerada_em?"?v="+encodeURIComponent(r.logo_gerada_em):"";
    const src=(r.logo_gerada_url?r.logo_gerada_url+buster:(String(r.logo_gerada_base64).startsWith("data:")?r.logo_gerada_base64:
      "data:image/png;base64,"+r.logo_gerada_base64));
    gerada=`<div class="rit" style="grid-column:1/-1"><b>Logo gerada (IA)</b>
      <img class="logoprev" src="${String(src).replace(/"/g,'&quot;')}" alt="logo gerada">
      ${r.logo_gerada_url?`<a class="verlogo" href="${esc(r.logo_gerada_url+buster)}" target="_blank" rel="noopener">Ver logo do cliente ↗</a>`:""}</div>`;
  }
  const OCULTOS=["logo_base64","logo_gerada_base64","logo_gerada_url","logo_erro","logo_erro_em","logo_chat","logo_historico"];
  // Quando o estúdio está na tela, esses campos já aparecem editáveis lá — não repete embaixo
  if(regerar) OCULTOS.push("nome_loja","estilo","cor_logo","cor_loja","sensacao","conta_mais");
  const itens=Object.entries(r)
    .filter(([k,v])=>!OCULTOS.includes(k)&&v!==null&&v!==""&&v!==undefined&&!(Array.isArray(v)&&!v.length))
    .map(([k,v])=>{
      let txt=Array.isArray(v)?v.join(", "):(typeof v==="boolean"?(v?"Sim":"Não"):String(v));
      return `<div class="rit"${k==="logo_prompt"?' style="grid-column:1/-1"':''}><b>${esc(RESP_LABELS[k]||k.replace(/_/g," "))}</b><span>${esc(txt)}</span></div>`;
    }).join("");
  if(!itens&&!logo&&!gerada&&!alerta&&!regerar) return `<p style="font:500 13.5px Inter;color:var(--muted)">Sem respostas registradas ainda.</p>`;
  return `<div class="resp">${alerta}${gerada}${logo}${regerar}${itens}</div>`;
}

function drawList(){
  const fl=filtrados();
  const total=agrupar(leads).length;
  $("finfo").innerHTML=(filtroForm?`Filtrando: <b>${esc((FORMS[filtroForm]||{label:filtroForm}).label)}</b> · <button class="clearf" id="clearf">limpar</button> · `:"")
    +fl.length+" de "+total+" pessoas";
  const cf=$("clearf"); if(cf) cf.onclick=()=>{filtroForm=null;draw();};

  if(!fl.length){
    $("list").innerHTML=`<div class="empty"><div class="big">Nenhum lead ${leads.length?"nesse filtro":"ainda"}.</div>
      <p>${leads.length?"Ajusta a busca ou limpa o filtro.":"Assim que alguém começar a preencher um form, aparece aqui."}</p></div>`;
    return;
  }
  $("list").innerHTML=`<div class="lhead"><span>Nome</span><span>Contato</span><span>Etapas</span><span style="text-align:right">Atualizado</span></div>`
    +fl.map(g=>{
      const chips=formsDoGrupo(g).map(f=>{
        const l=g.porForm[f], info=FORMS[f]||{label:f,fase:l.fase||""};
        const st=ST[l.status]||{label:l.status||"—",cls:"novo"};
        const etapa=(l.status==="concluido")?"":` · etapa ${l.step??"—"}`;
        return `<span class="st st-${st.cls}">${esc(info.fase||info.label)} · ${esc(st.label)}${esc(etapa)}</span>`;
      }).join("");
      const secoes=formsDoGrupo(g).map(f=>{
        const l=g.porForm[f], info=FORMS[f]||{label:f,fase:l.fase||""};
        const st=ST[l.status]||{label:l.status||"—",cls:"novo"};
        return `<div class="etsec">
          <div class="ethead"><b>${esc(info.fase?info.fase+" · ":"")}${esc(info.label)}</b>
            <span class="st st-${st.cls}">${esc(st.label)}${l.status!=="concluido"?` · etapa ${l.step??"—"}`:""}</span>
            <span class="ettime">${rel(l.atualizado_em)}</span></div>
          ${respHTML(l)}
          <div class="lid">id: ${esc(l.id)} · criado: ${l.criado_em?new Date(l.criado_em).toLocaleString("pt-BR"):"—"}</div>
        </div>`;
      }).join("");
      return `<div class="lrow ${aberto.has(g.key)?'open':''}" data-id="${esc(g.key)}">
        <div class="lmain">
          <div class="lnome">${g.nome?esc(g.nome):'<span class="anon">Sem nome</span>'}</div>
          <div class="lcontato"><div>${esc(g.email||"—")}</div><div>${esc(g.whatsapp||"—")}</div></div>
          <div class="etapas">${chips}</div>
          <div class="ltime">${rel(g.atualizado_em)}</div>
        </div>
        <div class="ldet">
          <h4>Histórico da pessoa</h4>
          ${secoes}
        </div>
      </div>`;
    }).join("");
  $("list").querySelectorAll(".lrow .lmain").forEach(m=>{
    m.onclick=()=>{
      const id=m.parentElement.dataset.id;
      aberto.has(id)?aberto.delete(id):aberto.add(id);
      m.parentElement.classList.toggle("open");
    };
  });
  $("list").querySelectorAll(".regen").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); gerarLogo(b.dataset.lead, b); };
  });
  // Estúdio: adicionar ajuste, remover ajuste, salvar campo editado
  $("list").querySelectorAll(".chatadd").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); addAjuste(b.dataset.lead, b); };
  });
  $("list").querySelectorAll(".msgdel").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); delAjuste(b.dataset.lead, +b.dataset.i); };
  });
  $("list").querySelectorAll(".fed").forEach(f=>{
    f.onclick=e=>e.stopPropagation();
    f.onchange=()=>salvarCampo(f.dataset.lead, f.dataset.k, f.value, f);
  });
  $("list").querySelectorAll(".chatinput, .chatbox, .estudio, .histbox").forEach(el=>{
    el.onclick=e=>e.stopPropagation(); // não fecha o lead ao interagir
  });
}

/* ===== Estúdio da logo: chat de ajustes + campos editáveis ===== */
async function patchRespostas(leadId, mut){
  const lead=leads.find(x=>x.id===leadId);
  if(!lead) return false;
  const novas=mut({...(lead.respostas||{})});
  const r=await fetch(SUPABASE_URL+"/rest/v1/leads?id=eq."+encodeURIComponent(leadId),{
    method:"PATCH",
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY,
      "Content-Type":"application/json",Prefer:"return=minimal"},
    body:JSON.stringify({respostas:novas})});
  if(r.ok) lead.respostas=novas;
  return r.ok;
}

async function addAjuste(leadId, btn){
  const ta=document.getElementById("ci-"+leadId);
  const txt=(ta.value||"").trim();
  if(!txt) return;
  btn.disabled=true; const antes=btn.textContent; btn.textContent="Salvando…";
  const ok=await patchRespostas(leadId, r=>{
    const chat=Array.isArray(r.logo_chat)?r.logo_chat.slice():[];
    chat.push({texto:txt, em:new Date().toISOString()});
    return {...r, logo_chat:chat};
  });
  btn.disabled=false; btn.textContent=antes;
  if(ok){ ta.value=""; draw(); } else alert("Não consegui salvar o ajuste.");
}

async function delAjuste(leadId, i){
  await patchRespostas(leadId, r=>{
    const chat=(Array.isArray(r.logo_chat)?r.logo_chat.slice():[]);
    chat.splice(i,1);
    return {...r, logo_chat:chat};
  });
  draw();
}

async function salvarCampo(leadId, k, valor, el){
  const v=k==="sensacao" ? valor.split(",").map(s=>s.trim()).filter(Boolean) : valor;
  const ok=await patchRespostas(leadId, r=>({...r, [k]:v}));
  el.classList.toggle("salvo", ok);
  el.classList.toggle("erro", !ok);
  setTimeout(()=>el.classList.remove("salvo","erro"), 1500);
}

/* Força a geração da logo de um lead (botão no painel, na Fase 2) */
async function gerarLogo(leadId, btn){
  const lead=leads.find(x=>x.id===leadId);
  if(!lead) return;
  const r=lead.respostas||{};
  const msg=document.getElementById("rg-"+leadId);
  const antes=btn.textContent;
  btn.disabled=true; btn.textContent="Gerando… (até 1 min)";
  if(msg){ msg.className="regenmsg"; msg.textContent="Chamando a IA, aguarda…"; }
  try{
    const resp=await fetch("/api/gerar-logo",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({lead_id:leadId,force:true,email:lead.email||"",
        lead_id_origem:r.lead_id_origem||null,
        respostas:{nome_loja:r.nome_loja,estilo:r.estilo,cor_loja:r.cor_loja,cor_logo:r.cor_logo,
          conta_mais:r.conta_mais,sensacao:r.sensacao}})});
    const j=await resp.json();
    if(j.ok){
      if(msg){ msg.className="regenmsg ok"; msg.textContent="✓ Logo gerada! Atualizando…"; }
      await load(true);
    } else {
      if(msg){ msg.className="regenmsg err"; msg.textContent="Falhou: "+(j.error||"erro desconhecido"); }
      btn.disabled=false; btn.textContent=antes;
    }
  }catch(e){
    if(msg){ msg.className="regenmsg err"; msg.textContent="Falhou: "+e.message; }
    btn.disabled=false; btn.textContent=antes;
  }
}

function draw(){drawCards();drawList();}

$("q").oninput=e=>{busca=e.target.value;drawList();};
$("refresh").onclick=()=>load(true);

load();
timer=setInterval(load,REFRESH_MS);
