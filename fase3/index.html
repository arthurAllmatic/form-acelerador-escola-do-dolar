<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escola do Dólar · Fase 3 — Como vai receber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--ink:#1a1620;--muted:#6a6470;--line:#e9e7ea;
    --gold:#b8860b;--gold-deep:#8a6a2c;--gold-soft:#faf4e4;--gold-line:#ecdcaf;
    --grad:linear-gradient(135deg,#8a6a2c,#caa64e 45%,#a6791f);
    --btn:linear-gradient(135deg,#c29a44,#eccf85 48%,#b8860b);
    --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;overflow-x:hidden}
  .b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ital{font-style:italic}

  header.brand{display:flex;align-items:center;justify-content:center;background:#fff;padding:40px 24px 4px;width:100%;max-width:680px;margin:0 auto}
  .brandlogo{width:min(380px,82vw);height:auto;object-fit:contain;display:block;margin:0 auto;filter:brightness(0)}
  .logofallback{font-family:var(--serif);font-size:26px;color:var(--ink)}

  .wrap{flex:1;display:flex;flex-direction:column;max-width:680px;width:100%;margin:0 auto;padding:0 24px 24px}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0 30px;min-height:44px}

  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0 0;text-align:center;align-items:center}
  .hero .kick{font:600 12px Inter;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:18px}
  .hero h1{font:400 clamp(34px,8vw,52px)/1.08 var(--serif);letter-spacing:0;margin-bottom:16px;max-width:600px}
  .hero p{font:400 17px/1.7 Inter;color:#4a4651;max-width:520px;margin-bottom:28px}
  .videobox{width:100%;max-width:560px;aspect-ratio:16/9;border:1.8px dashed var(--gold-line);border-radius:18px;
    background:var(--gold-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:30px}
  .videobox .play{width:58px;height:58px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px}
  .videobox span{font:600 13px Inter;letter-spacing:1px;text-transform:uppercase;color:var(--gold-deep)}
  .start{background:var(--btn);color:#2a1f08;border:none;font:700 15px Inter;letter-spacing:.3px;padding:17px 40px;
    border-radius:36px;cursor:pointer;box-shadow:0 12px 28px -12px rgba(184,134,11,.75);transition:.18s}
  .start:hover{filter:brightness(1.04)}

  .thanks{flex:1;min-height:calc(100dvh - 120px);position:relative;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px 8px;overflow:hidden}
  .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--serif);
    font-size:clamp(60px,16vw,150px);line-height:1;color:var(--ink);opacity:.04;letter-spacing:1px;
    white-space:nowrap;pointer-events:none;z-index:0;max-width:100%}
  .thanks>*{position:relative;z-index:1}
  .thanks .eyebrow{display:flex;align-items:center;gap:12px;justify-content:center;font:600 12px Inter;letter-spacing:3px;
    text-transform:uppercase;color:var(--gold-deep);margin-bottom:20px}
  .thanks .eyebrow::before,.thanks .eyebrow::after{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  .thanks h1{font:400 clamp(36px,7vw,56px)/1.06 var(--serif);letter-spacing:0;margin:0 0 18px;max-width:680px}
  .thanks p{font:400 clamp(15px,2.4vw,17px)/1.65 Inter;color:#4a4651;max-width:520px;margin:0 auto 28px}

  .plan{text-align:left;max-width:520px;width:100%;margin:0 auto 26px;display:flex;flex-direction:column;gap:14px}
  .planc{border:1.5px solid var(--line);border-radius:16px;padding:18px 20px;background:#fff}
  .planc h4{font:600 12px Inter;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
  .planc ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .planc li{font:500 15px/1.4 Inter;color:#4a4651;padding-left:18px;position:relative}
  .planc li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--grad)}
  .notebar{display:flex;align-items:center;gap:10px;max-width:520px;width:100%;margin:0 auto 26px;border:1.5px solid var(--gold-line);
    background:var(--gold-soft);border-radius:14px;padding:14px 18px;font:500 14.5px Inter;color:var(--gold-deep);text-align:left}
  .thanks .ty-end{font:400 clamp(28px,5.5vw,38px) var(--serif);font-style:italic;display:inline-block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
</style>
</head>
<body>
  <header class="brand" id="brand">
    <img src="https://i.imgur.com/1x7C3Vr.png" alt="Escola do Dólar" class="brandlogo" onerror="this.style.display='none';document.getElementById('bf').style.display='inline-block'">
    <span id="bf" class="logofallback" style="display:none">Escola do Dólar</span>
  </header>
  <main class="wrap" id="app"></main>

<script>
const FASE="fase3", FORMULARIO="como_vai_receber";
const WEBHOOK="https://webhook.allmaticbrasil.com/webhook/lojaexclusiva";

/* ===== SUPABASE (config única — preencher com as credenciais do projeto) ===== */
const SUPABASE_URL="";      // ex: https://xxxx.supabase.co
const SUPABASE_ANON_KEY=""; // chave anon public

/* Identidade vem da URL: ?nome=Maria&email=maria@x.com&whatsapp=27998233325 */
const Q=new URLSearchParams(location.search);
function qp(){for(const k of arguments){const v=Q.get(k);if(v)return v;}return "";}

const app=document.getElementById("app");
const ans={
  _id:(self.crypto&&crypto.randomUUID?crypto.randomUUID():"lead_"+Date.now()+"_"+Math.random().toString(36).slice(2,8)),
  nome:qp("nome","name","first_name","fname","primeiro_nome"),
  email:qp("email","mail","e-mail"),
  whatsapp:qp("whatsapp","telefone","phone","wpp","celular","tel","fone"),
  ddi:qp("ddi")||"+55"
};

function buildPayload(status){
  return {
    id:ans._id, fase:FASE, formulario:FORMULARIO, status:status,
    nome:ans.nome||"", email:(ans.email||"").trim(), whatsapp:ans.whatsapp||"", ddi:ans.ddi||"",
    atualizado_em:new Date().toISOString()
  };
}
function sendWebhook(status){
  try{ fetch(WEBHOOK,{method:"POST",mode:"no-cors",keepalive:true,
    headers:{"Content-Type":"text/plain;charset=UTF-8"},body:JSON.stringify(buildPayload(status))}); }catch(e){}
  sendSupabase(status);
}
function sendSupabase(status){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY) return;
  try{
    const p=buildPayload(status);
    const row={id:p.id,fase:p.fase,formulario:p.formulario,status:p.status,
      step:(status==="concluido"?1:0),
      nome:p.nome,email:p.email,whatsapp:p.whatsapp,respostas:{},atualizado_em:p.atualizado_em};
    fetch(SUPABASE_URL+"/rest/v1/leads?on_conflict=id",{method:"POST",keepalive:true,
      headers:{apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY,
      "Content-Type":"application/json",Prefer:"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify(row)});
  }catch(e){}
}

function firstName(){ return (ans.nome||"").trim().split(/\s+/)[0]||""; }

function renderWelcome(){
  const n=firstName();
  app.innerHTML=`
    <div class="nav"></div>
    <div class="hero">
      <div class="kick">Fase 3 · Última parte</div>
      <h1>Quase lá${n?", "+n:""}. <span class="b ital">Última parte.</span></h1>
      <p>Tá tudo pronto do seu lado. Falta só a gente finalizar a sua loja e te chamar. Toca pra confirmar.</p>
      <button class="start" id="start">Continuar &rarr;</button>
    </div>`;
  document.getElementById("start").onclick=()=>{ sendWebhook("concluido"); renderFinal(); };
}

function renderFinal(){
  const n=firstName();
  document.getElementById('brand').style.display='none';
  app.innerHTML=`
    <div class="thanks">
      <div class="wm">Pronto</div>
      <div class="eyebrow">Obrigado${n?", "+n:""}</div>
      <h1>Pronto! Agora é com a <span class="b ital">nossa equipe</span>.</h1>
      <p>Nosso time está preparando sua loja. A gente te avisa pelo WhatsApp em até <b>24 horas</b>.</p>
      <div class="plan">
        <div class="planc">
          <h4>Você (agora)</h4>
          <ul>
            <li>Fica de olho no WhatsApp nas próximas 24 horas</li>
            <li>Já vai separando os primeiros produtos que quer vender</li>
          </ul>
        </div>
        <div class="planc">
          <h4>Nossa equipe (ao mesmo tempo)</h4>
          <ul>
            <li>Cria 3 opções de logo no seu jeito</li>
            <li>Escreve a descrição da sua loja</li>
            <li>Escolhe os fornecedores e produtos da sua loja</li>
          </ul>
        </div>
      </div>
      <div class="notebar">💬 A gente te avisa pelo WhatsApp em até 24 horas.</div>
      <div class="ty-end">Vem que a meta é euro!</div>
    </div>`;
}

sendWebhook("novo_lead");
renderWelcome();
</script>
</body>
</html>
