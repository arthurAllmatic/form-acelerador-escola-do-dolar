<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escola do Dólar · Fase 1 — Reconhecimento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--ink:#1a1620;--muted:#6a6470;--line:#e9e7ea;
    --gold:#b8860b;--gold-deep:#8a6a2c;--gold-soft:#faf4e4;--gold-line:#ecdcaf;
    --grad:linear-gradient(135deg,#8a6a2c,#caa64e 45%,#a6791f);
    --btn:linear-gradient(135deg,#c29a44,#eccf85 48%,#b8860b);
    --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;overflow-x:hidden}
  .b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ital{font-style:italic}

  header.brand{display:flex;align-items:center;justify-content:center;background:#fff;padding:40px 24px 4px;width:100%;max-width:680px;margin:0 auto}
  .brandlogo{width:min(380px,82vw);height:auto;object-fit:contain;display:block;margin:0 auto;filter:brightness(0)}
  .logofallback{font-family:var(--serif);font-size:26px;color:var(--ink)}

  .wrap{flex:1;display:flex;flex-direction:column;max-width:680px;width:100%;margin:0 auto;padding:0 24px 24px}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0 30px;min-height:44px}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);
    font:600 13px Inter;letter-spacing:.4px;cursor:pointer;padding:6px 4px;border-radius:8px;visibility:hidden}
  .back:hover{color:var(--ink)}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:7px;height:7px;border-radius:5px;background:var(--line);transition:.25s}
  .dot.done{background:var(--gold)}
  .dot.cur{width:22px;background:var(--gold)}
  .count{font:600 13px Inter;color:var(--muted);min-width:50px;text-align:right;letter-spacing:.4px}

  .screen{flex:1;display:flex;flex-direction:column;animation:in .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .eyebrow{display:flex;align-items:center;gap:12px;font:600 12px Inter;letter-spacing:3px;
    text-transform:uppercase;color:var(--gold-deep);margin-bottom:20px}
  .eyebrow::before{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  h1.q{font:400 clamp(30px,6.2vw,40px)/1.12 var(--serif);letter-spacing:0;margin-bottom:12px}
  .sub{font:400 16px/1.5 Inter;color:var(--muted);margin:-2px 0 24px}
  .body{margin-top:10px}

  textarea.fld{width:100%;border:1.5px solid var(--line);border-radius:14px;background:#fff;
    padding:17px 18px;font:500 17px Inter;color:var(--ink);outline:none;transition:.18s;resize:none;min-height:120px;line-height:1.45}
  textarea.fld::placeholder{color:#b6bcc6}
  textarea.fld:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
  input.fld{width:100%;border:1.5px solid var(--line);border-radius:14px;background:#fff;
    padding:17px 18px;font:500 17px Inter;color:var(--ink);outline:none;transition:.18s}
  input.fld::placeholder{color:#b6bcc6}
  input.fld:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
  .gateerr{margin-top:14px;border:1.5px solid var(--gold-line);background:var(--gold-soft);border-radius:14px;
    padding:14px 18px;font:500 14.5px/1.55 Inter;color:var(--gold-deep);animation:in .3s ease}
  .gateerr a{display:inline-block;margin-top:8px;font:700 14px Inter;color:var(--gold-deep)}

  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:14px;background:#fff;
    padding:15px 18px;cursor:pointer;transition:.16s;text-align:left;width:100%}
  .opt:hover{border-color:var(--gold-line)}
  .opt .mark{flex:0 0 auto;width:21px;height:21px;border:1.8px solid #cfcabb;display:flex;align-items:center;
    justify-content:center;transition:.16s;color:#fff;font-size:13px}
  .opt[data-multi="0"] .mark{border-radius:50%}
  .opt[data-multi="1"] .mark{border-radius:6px}
  .opt.sel{border-color:var(--gold);background:var(--gold-soft)}
  .opt.sel .mark{background:var(--gold);border-color:var(--gold)}
  .opt.sel .mark::after{content:"\2713"}
  .optx{display:flex;flex-direction:column;gap:2px}
  .optx b{font:600 16px Inter;color:var(--ink)}
  .optx i{font:400 13.5px/1.35 Inter;font-style:normal;color:var(--muted)}

  .pills{display:flex;flex-wrap:wrap;gap:10px}
  .pill{border:1.5px solid var(--line);border-radius:30px;padding:11px 18px;font:500 15px Inter;color:var(--ink);
    cursor:pointer;background:#fff;transition:.16s}
  .pill:hover{border-color:var(--gold-line)}
  .pill.sel{border-color:var(--gold);background:var(--gold-soft);color:var(--gold-deep);font-weight:600}

  .plan{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .planc{border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;background:#fff}
  .planc h4{font:600 11px Inter;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:9px}
  .planc ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .planc li{font:500 14.5px/1.4 Inter;color:#4a4651;padding-left:17px;position:relative}
  .planc li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--grad)}

  .foot{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:32px 0 8px;margin-top:auto}
  .skip{background:none;border:none;color:var(--muted);font:600 13px Inter;cursor:pointer;visibility:hidden}
  .skip:hover{color:var(--ink)}
  .next{margin-left:auto;display:inline-flex;align-items:center;gap:9px;background:var(--btn);color:#2a1f08;border:none;
    font:700 15px Inter;letter-spacing:.2px;padding:15px 32px;border-radius:34px;cursor:pointer;transition:.18s;
    box-shadow:0 10px 24px -12px rgba(184,134,11,.7)}
  .next:hover{filter:brightness(1.04)}
  .next:disabled{background:#edeef0;color:#aeb4be;box-shadow:none;cursor:not-allowed}

  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0 0}
  .hero .kick{font:600 12px Inter;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:20px;
    display:flex;align-items:center;gap:12px}
  .hero .kick::before{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  .hero h1{font:400 clamp(34px,8.5vw,56px)/1.07 var(--serif);letter-spacing:0;margin-bottom:24px}
  .hero p{font:400 17px/1.7 Inter;color:#4a4651;max-width:560px;margin-bottom:32px}
  .herorow{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .start{background:var(--btn);color:#2a1f08;border:none;font:700 15px Inter;letter-spacing:.3px;padding:17px 36px;
    border-radius:36px;cursor:pointer;box-shadow:0 12px 28px -12px rgba(184,134,11,.75);transition:.18s;text-transform:uppercase}
  .start:hover{filter:brightness(1.04)}
  .hint{font:500 12px Inter;letter-spacing:1px;text-transform:uppercase;color:#b3b0ba}

  .thanks{flex:1;min-height:calc(100dvh - 120px);position:relative;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px 8px;overflow:hidden}
  .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--serif);
    font-size:clamp(60px,16vw,150px);line-height:1;color:var(--ink);opacity:.04;letter-spacing:1px;
    white-space:nowrap;pointer-events:none;z-index:0;max-width:100%}
  .thanks>*{position:relative;z-index:1}
  .thanks .eyebrow{justify-content:center;margin-bottom:22px}
  .thanks .eyebrow::after{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  .thanks h1{font:400 clamp(38px,7.5vw,60px)/1.06 var(--serif);letter-spacing:0;margin:0 0 24px;max-width:680px}
  .thanks p{font:400 clamp(16px,2.4vw,17px)/1.7 Inter;color:#4a4651;max-width:540px;margin:0 auto 32px}
  .thanks .ty-end{font:400 clamp(30px,5.5vw,38px) var(--serif);font-style:italic;display:inline-block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
</style>
</head>
<body>
  <header class="brand" id="brand">
    <img src="https://i.imgur.com/1x7C3Vr.png" alt="Escola do Dólar" class="brandlogo" onerror="this.style.display='none';document.getElementById('bf').style.display='inline-block'">
    <span id="bf" class="logofallback" style="display:none">Escola do Dólar</span>
  </header>
  <main class="wrap" id="app"></main>

<script>
const FASE="fase1", FORMULARIO="reconhecimento";
const WEBHOOK="https://webhook.allmaticbrasil.com/webhook/lojaexclusiva";

/* ===== SUPABASE (config única — preencher com as credenciais do projeto) ===== */
const SUPABASE_URL="https://wiktreeseddzzhbsbwkz.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpa3RyZWVzZWRkenpoYnNid2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5NDkwMDgsImV4cCI6MjA3NzUyNTAwOH0.U-X9n-SK0zLC7ZU_RBXYvXjRpLTnOAqTWJxMOmY5JFk";

/* Identidade vem da URL: ?nome=Maria&email=maria@x.com&whatsapp=27998233325 */
const Q=new URLSearchParams(location.search);
function qp(){for(const k of arguments){const v=Q.get(k);if(v)return v;}return "";}

const STEPS=[
  {key:"plano",n:1,type:"info",eyebrow:"Veja o plano",nextLabel:"Começar agora",title:'Sua loja pronta em <span class="b ital">3 partes</span>.',sub:"No seu ritmo. A gente te explica cada parte quando chegar a hora.",
    html:`<div class="plan">
      <div class="planc"><h4>Fase 1 · 1-2 dias</h4><ul><li>Você (hoje, ~10-15 min): faz esse reconhecimento</li><li>Equipe: valida o nicho e separa fornecedores e produtos</li></ul></div>
      <div class="planc"><h4>Fase 2 · 1-2 dias</h4><ul><li>Você: escolhe a logo, a descrição e os primeiros produtos</li><li>Equipe: publica sua loja com a identidade pronta</li></ul></div>
      <div class="planc"><h4>Fase 3 · pra faturar</h4><ul><li>Você: deixa o recebimento em euro pronto e acompanha</li><li>Equipe: sobe os produtos validados no ritmo certo</li></ul></div>
    </div>`},
  {key:"experiencia",n:2,type:"single",eyebrow:"Queremos te conhecer · Pergunta 1 de 5",title:'Oi, {n}. Você já <span class="b ital">vendeu online</span> antes?',sub:"Isso nos ajuda a montar uma loja do seu jeito.",
    options:[
      {t:"Tenho loja ativa na Shopify",d:"Já vendo ou já tenho a loja criada lá"},
      {t:"Vendo em outro lugar",d:"Instagram, WhatsApp, marketplace ou loja própria"},
      {t:"Sim, mas parei",d:"Já tive loja, hoje não vendo"},
      {t:"Nunca vendi online",d:"É a primeira vez"}
    ]},
  {key:"motivo",n:3,type:"multi",pills:true,eyebrow:"Queremos te conhecer · Pergunta 2 de 5",title:'O que te motivou a entrar no <span class="b ital">Acelerador</span>?',sub:"Pode marcar várias.",
    options:["Faturar em euro","Não depender de chefe","Trabalhar no meu horário","Sair do trabalho fixo","Ter meu próprio negócio"]},
  {key:"trava",n:4,type:"single",eyebrow:"Queremos te conhecer · Pergunta 3 de 5",title:'Hoje, o que mais <span class="b ital">te trava</span> pra vender pra fora?',sub:"Escolha o ponto que mais pesa agora.",
    options:[
      {t:"Escolher bons produtos",d:"Não sei o que vale a pena vender"},
      {t:"Configurar a loja",d:"Tenho receio da parte técnica"},
      {t:"Criar anúncios que vendem",d:"Título, fotos, descrição e oferta"},
      {t:"Medo de errar",d:"Quero evitar perder tempo ou dinheiro"},
      {t:"Falta de tempo",d:"Preciso de um caminho mais direto"},
      {t:"Não saber por onde começar",d:"Quero um passo a passo claro"}
    ]},
  {key:"categoria",n:5,type:"single",eyebrow:"Queremos te conhecer · Pergunta 4 de 5",title:'Qual <span class="b ital">nicho</span> combina mais com você?',sub:"A equipe valida e monta a melhor loja pro seu perfil.",
    options:["🧬 Longevidade","⚡ Vitalidade","🧔 Saúde Masculina","Escolha pra mim — confio na equipe"]},
  {key:"tempo",n:6,type:"single",eyebrow:"Queremos te conhecer · Pergunta 5 de 5",title:'Quantas <span class="b ital">horas por semana</span> você consegue tirar pra isso?',sub:"Não tem resposta certa. Só ajuda a gente a planejar.",
    options:[
      {t:"Menos de 5h",d:"Vou dedicar pouco tempo"},
      {t:"5 a 10h",d:"Tempo médio"},
      {t:"10 a 20h",d:"Quase meio-período"},
      {t:"Mais de 20h",d:"Vou focar nisso"}
    ]}
];

const app=document.getElementById("app");
const ans={
  _id:(self.crypto&&crypto.randomUUID?crypto.randomUUID():"lead_"+Date.now()+"_"+Math.random().toString(36).slice(2,8)),
  nome:qp("nome","name","first_name","fname","primeiro_nome"),
  email:qp("email","mail","e-mail"),
  whatsapp:qp("whatsapp","telefone","phone","wpp","celular","tel","fone"),
  ddi:qp("ddi")||"+55"
};
let i=-1, leadEnviado=false, identified=false, checking=false, gateMsg="";

function seq(){ return STEPS.filter(s=>!s.cond||s.cond(ans)); }

/* ===== Identificação por e-mail (base do Supabase) ===== */
const FORM_CADASTRO="https://lojaexclusiva.escoladodolar.com/";
const GATE_NOTFOUND=`<div class="gateerr">A gente não achou esse e-mail na nossa base. Confere se digitou certinho — ou, se ainda não fez a primeira etapa, começa por ela:<br><a href="${FORM_CADASTRO}">Fazer meu cadastro &rarr;</a></div>`;
const GATE_OFFLINE=`<div class="gateerr">Não conseguimos verificar agora. Espera um instante e tenta de novo.</div>`;

function emailOk(v){return /.+@.+\..+/.test((v||"").trim())}

async function lookupEmail(email){
  const q=encodeURIComponent((email||"").trim());
  const r=await fetch(SUPABASE_URL+"/rest/v1/leads?select=id,nome,email,whatsapp,formulario&email=ilike."+q+"&order=atualizado_em.desc&limit=10",
    {headers:{apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY}});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const rows=await r.json();
  return rows.find(x=>x.formulario==="reconhecimento")||rows[0]||null;
}

function aplicarIdentidade(row){
  identified=true;
  ans._origem=row.id;
  ans.email=row.email||ans.email;
  if(row.nome) ans.nome=row.nome;
  if(row.whatsapp) ans.whatsapp=row.whatsapp;
}

function renderGate(){
  const hdr=document.getElementById('brand'); if(hdr) hdr.style.display='flex';
  app.innerHTML=`
    <div class="nav"><button class="back" style="visibility:hidden">&larr;</button><div class="dots"></div><div class="count"></div></div>
    <div class="screen">
      <div class="eyebrow">Identificação</div>
      <h1 class="q">Pra continuar, qual seu <span class="b ital">e-mail</span>?</h1>
      <div class="sub">É o mesmo e-mail que você cadastrou na primeira etapa (o da compra na Hotmart).</div>
      <div class="body">
        <input class="fld" id="gmail" type="email" placeholder="voce@email.com" value="${(ans.email||"").replace(/"/g,'&quot;')}" autocomplete="email">
        <div id="gmsg">${gateMsg}</div>
      </div>
      <div class="foot"><button class="next" id="gnext">Continuar</button></div>
    </div>`;
  gateMsg="";
  const f=document.getElementById("gmail"), btn=document.getElementById("gnext"), box=document.getElementById("gmsg");
  const upd=()=>{btn.disabled=checking||!emailOk(f.value)};
  f.oninput=upd;
  f.onkeydown=e=>{if(e.key==="Enter"&&!btn.disabled)btn.click()};
  btn.onclick=async()=>{
    if(checking) return;
    checking=true; btn.textContent="Verificando…"; upd();
    try{
      const row=await lookupEmail(f.value);
      if(row){ aplicarIdentidade(row); checking=false; render(); return; }
      box.innerHTML=GATE_NOTFOUND;
    }catch(e){ box.innerHTML=GATE_OFFLINE; }
    checking=false; btn.textContent="Continuar"; upd();
  };
  f.focus(); upd();
}

function buildPayload(step,status){
  return {
    id:ans._id, fase:FASE, formulario:FORMULARIO, step:step, status:status,
    nome:ans.nome||"", email:(ans.email||"").trim(), whatsapp:ans.whatsapp||"", ddi:ans.ddi||"",
    respostas:{
      lead_id_origem:ans._origem||null,
      ja_vendeu:ans.experiencia||null, motivo:ans.motivo||null,
      o_que_trava:ans.trava||null, nicho:ans.categoria||null, horas_por_semana:ans.tempo||null
    },
    atualizado_em:new Date().toISOString()
  };
}
function sendWebhook(step,status){
  try{
    const body=JSON.stringify(buildPayload(step,status));
    const opt={method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=UTF-8"},body};
    if(body.length<60000) opt.keepalive=true;
    fetch(WEBHOOK,opt);
  }catch(e){}
  sendSupabase(step,status);
  sendGHL(status);
}
function stripHtml(s){return String(s==null?"":s).replace(/<[^>]+>/g," ").replace(/\s+/g," ").replace(/\s+([?.!,;:])/g,"$1").trim();}
function buildNotaGHL(){
  const l=[];
  for(const s of seq()){
    if(s.type==="info"||s.key==="logo") continue;
    const v=ans[s.key];
    if(v==null||v===""||(Array.isArray(v)&&!v.length)) continue;
    const a=Array.isArray(v)?v.join(", "):(typeof v==="boolean"?(v?"Sim":"Não"):String(v));
    l.push("• "+stripHtml(tok(s.title))+"\n   "+a);
  }
  return "📋 Fase 1 · Reconhecimento\n\n"+l.join("\n\n");
}
function sendGHL(status){
  try{
    const p={fase:FASE,status,nome:ans.nome||"",email:(ans.email||"").trim(),whatsapp:ans.whatsapp||""};
    if(status==="concluido") p.nota=buildNotaGHL();
    fetch("/api/ghl",{method:"POST",keepalive:true,headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
  }catch(e){}
}
function sendSupabase(step,status){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY) return;
  try{
    const p=buildPayload(step,status);
    const row={id:p.id,fase:p.fase,formulario:p.formulario,status:p.status,step:p.step,
      nome:p.nome,email:p.email,whatsapp:p.whatsapp,respostas:p.respostas,atualizado_em:p.atualizado_em};
    const body=JSON.stringify(row);
    const opt={method:"POST",headers:{
      apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY,
      "Content-Type":"application/json",Prefer:"resolution=merge-duplicates,return=minimal"},body};
    if(body.length<60000) opt.keepalive=true;
    fetch(SUPABASE_URL+"/rest/v1/leads?on_conflict=id",opt);
  }catch(e){}
}

function firstName(){ return (ans.nome||"").trim().split(/\s+/)[0]||""; }
function tok(s){ if(!s) return s; const n=firstName();
  if(n) return s.replace(/\{n\}/g,n);
  return s.replace(/,?\s*\{n\}\s*,?/g," ").replace(/\s{2,}/g," ").replace(/\s+([.!?—])/g,"$1").trim(); }

function valid(step){
  if(step.optional||step.type==="info") return true;
  const v=ans[step.key];
  if(step.type==="multi") return Array.isArray(v)&&v.length>0;
  if(step.type==="single") return !!v;
  return (v||"").trim().length>1;
}

function render(){
  if(!identified){renderGate();return}
  const list=seq();
  const hdr=document.getElementById('brand'); if(hdr) hdr.style.display=(i===-1?'flex':'none');
  if(i===-1){renderWelcome();return}
  if(i>=list.length){renderFinal();return}
  const s=list[i];
  const isInfo=s.type==="info";
  const dots=isInfo?"":list.map((_,k)=>`<span class="dot ${k<i?'done':''} ${k===i?'cur':''}"></span>`).join("");
  let bodyHTML="";
  if(s.type==="info"){
    bodyHTML=s.html||"";
  } else if(s.type==="textarea"){
    bodyHTML=`<textarea class="fld" id="fld" placeholder="${s.placeholder||""}">${ans[s.key]||""}</textarea>`;
  } else if(s.type==="multi"&&s.pills){
    const sel=ans[s.key]||[];
    bodyHTML=`<div class="pills">`+s.options.map((o,k)=>`<button class="pill ${sel.includes(o)?'sel':''}" data-o="${k}">${o}</button>`).join("")+`</div>`;
  } else {
    const sel=ans[s.key]||(s.type==="multi"?[]:null);
    bodyHTML=`<div class="opts">`+s.options.map((o,k)=>{
      const lab=typeof o==="string"?o:o.t, desc=typeof o==="string"?"":o.d;
      const isSel=s.type==="multi"?sel.includes(lab):sel===lab;
      return `<button class="opt ${isSel?'sel':''}" data-multi="${s.type==='multi'?1:0}" data-o="${k}"><span class="mark"></span><span class="optx"><b>${lab}</b>${desc?`<i>${desc}</i>`:''}</span></button>`;
    }).join("")+`</div>`;
  }
  app.innerHTML=`
    <div class="nav">
      <button class="back" id="back">&larr; Voltar</button>
      <div class="dots">${dots}</div>
      <div class="count"></div>
    </div>
    <div class="screen">
      <div class="eyebrow">${s.eyebrow}</div>
      <h1 class="q">${tok(s.title)}</h1>
      ${s.sub?`<div class="sub">${tok(s.sub)}</div>`:""}
      <div class="body">${bodyHTML}</div>
      <div class="foot">
        ${s.optional?'<button class="skip" id="skip" style="visibility:visible">Pular</button>':''}
        <button class="next" id="next">${s.nextLabel||"Próxima"}</button>
      </div>
    </div>`;
  document.getElementById("back").style.visibility="visible";
  wire(s);
}

function wire(s){
  const next=document.getElementById("next");
  const back=document.getElementById("back");
  back.onclick=()=>{i=Math.max(-1,i-1);render()};
  const skip=document.getElementById("skip"); if(skip) skip.onclick=go;
  const upd=()=>{ next.disabled=!valid(s); };
  if(s.type==="textarea"){
    const f=document.getElementById("fld"); f.focus();
    f.oninput=()=>{ans[s.key]=f.value;upd()};
  } else if(s.type==="multi"&&s.pills){
    app.querySelectorAll(".pill").forEach(btn=>{
      btn.onclick=()=>{
        const o=s.options[btn.dataset.o];
        ans[s.key]=ans[s.key]||[];
        const idx=ans[s.key].indexOf(o);
        if(idx>=0){ans[s.key].splice(idx,1);btn.classList.remove("sel")}
        else{ if(s.max&&ans[s.key].length>=s.max) return; ans[s.key].push(o);btn.classList.add("sel")}
        upd();
      };
    });
  } else if(s.type!=="info"){
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const o=s.options[btn.dataset.o]; const lab=typeof o==="string"?o:o.t;
        if(s.type==="multi"){
          ans[s.key]=ans[s.key]||[];
          const idx=ans[s.key].indexOf(lab);
          if(idx>=0){ans[s.key].splice(idx,1);btn.classList.remove("sel")}
          else{ if(s.max&&ans[s.key].length>=s.max) return; ans[s.key].push(lab);btn.classList.add("sel")}
          upd();
        } else {
          ans[s.key]=lab;
          app.querySelectorAll(".opt").forEach(b=>b.classList.remove("sel"));
          btn.classList.add("sel");
          upd();
          setTimeout(go,230);
        }
      };
    });
  }
  next.onclick=go; upd();
}

function go(){
  const list=seq(); const s=list[i]; if(!valid(s)) return;
  i++;
  const list2=seq();
  if(i>=list2.length) sendWebhook(s.n,"concluido");
  else sendWebhook(s.n,"em_andamento");
  render();
}

    <div class="nav"><button class="back" style="visibility:hidden">&larr;</button><div class="dots"></div><div class="count"></div></div>
    <div class="hero">

      <h1>${n?n+", vamos":"Vamos"} construir a <span class="b ital">sua loja</span> juntos.</h1>

      <div class="herorow">

      </div>

  document.getElementById("start").onclick=()=>{ if(!leadEnviado){sendWebhook(0,"novo_lead");leadEnviado=true;} i=0;render(); };

      <p>Com isso a equipe já começa a desenhar a sua loja nichada${n?", "+n:""}. Fica de olho no WhatsApp — em breve a gente te chama pra <b>Fase 2</b>, onde você monta a cara da sua loja.</p>
