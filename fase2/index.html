<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escola do Dólar · Fase 2 — Sua Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--ink:#1a1620;--muted:#6a6470;--line:#e9e7ea;
    --gold:#b8860b;--gold-deep:#8a6a2c;--gold-soft:#faf4e4;--gold-line:#ecdcaf;
    --grad:linear-gradient(135deg,#8a6a2c,#caa64e 45%,#a6791f);
    --btn:linear-gradient(135deg,#c29a44,#eccf85 48%,#b8860b);
    --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;overflow-x:hidden}
  .b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ital{font-style:italic}

  header.brand{display:flex;align-items:center;justify-content:center;background:#fff;padding:40px 24px 4px;width:100%;max-width:680px;margin:0 auto}
  .brandlogo{width:min(380px,82vw);height:auto;object-fit:contain;display:block;margin:0 auto;filter:brightness(0)}
  .logofallback{font-family:var(--serif);font-size:26px;color:var(--ink)}

  .wrap{flex:1;display:flex;flex-direction:column;max-width:680px;width:100%;margin:0 auto;padding:0 24px 24px}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0 30px;min-height:44px}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);
    font:600 13px Inter;letter-spacing:.4px;cursor:pointer;padding:6px 4px;border-radius:8px;visibility:hidden}
  .back:hover{color:var(--ink)}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:7px;height:7px;border-radius:5px;background:var(--line);transition:.25s}
  .dot.done{background:var(--gold)}
  .dot.cur{width:22px;background:var(--gold)}
  .count{font:600 13px Inter;color:var(--muted);min-width:50px;text-align:right;letter-spacing:.4px}

  .screen{flex:1;display:flex;flex-direction:column;animation:in .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .eyebrow{display:flex;align-items:center;gap:12px;font:600 12px Inter;letter-spacing:3px;
    text-transform:uppercase;color:var(--gold-deep);margin-bottom:20px}
  .eyebrow::before{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  h1.q{font:400 clamp(30px,6.2vw,40px)/1.12 var(--serif);letter-spacing:0;margin-bottom:12px}
  .sub{font:400 16px/1.5 Inter;color:var(--muted);margin:-2px 0 24px}
  .body{margin-top:10px}

  input.fld,textarea.fld,select.fld{width:100%;border:1.5px solid var(--line);border-radius:14px;background:#fff;
    padding:17px 18px;font:500 17px Inter;color:var(--ink);outline:none;transition:.18s}
  input.fld::placeholder,textarea.fld::placeholder{color:#b6bcc6}
  input.fld:focus,textarea.fld:focus,select.fld:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
  textarea.fld{resize:none;min-height:120px;line-height:1.45}

  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:14px;background:#fff;
    padding:15px 18px;font:500 16px Inter;cursor:pointer;transition:.16s;text-align:left;width:100%}
  .opt:hover{border-color:var(--gold-line)}
  .opt .mark{flex:0 0 auto;width:21px;height:21px;border:1.8px solid #cfcabb;display:flex;align-items:center;
    justify-content:center;transition:.16s;color:#fff;font-size:13px}
  .opt[data-multi="0"] .mark{border-radius:50%}
  .opt[data-multi="1"] .mark{border-radius:6px}
  .opt.sel{border-color:var(--gold);background:var(--gold-soft)}
  .opt.sel .mark{background:var(--gold);border-color:var(--gold)}
  .opt.sel .mark::after{content:"\2713"}

  .reveal{margin-top:12px;display:none}
  .reveal.on{display:block;animation:in .3s ease}

  .uploadbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;cursor:pointer;
    border:1.8px dashed var(--gold-line);border-radius:16px;background:var(--gold-soft);
    padding:30px 18px;font:600 15px Inter;color:var(--gold-deep);transition:.16s}
  .uploadbtn:hover{border-color:var(--gold);background:#fbf0d8}
  .upinfo{margin-top:14px;display:flex;align-items:center;gap:14px;min-height:0}
  .upthumb{width:64px;height:64px;object-fit:contain;border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:6px}
  .upname{font:500 14px Inter;color:var(--ink);word-break:break-all}
  .upok{font:600 12px Inter;letter-spacing:.3px;color:#2e7d32;display:block;margin-top:2px}
  .uperr{font:500 14px Inter;color:#c0392b}

  .foot{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:32px 0 8px;margin-top:auto}
  .skip{background:none;border:none;color:var(--muted);font:600 13px Inter;cursor:pointer;visibility:hidden}
  .skip:hover{color:var(--ink)}
  .next{margin-left:auto;display:inline-flex;align-items:center;gap:9px;background:var(--btn);color:#2a1f08;border:none;
    font:700 15px Inter;letter-spacing:.2px;padding:15px 32px;border-radius:34px;cursor:pointer;transition:.18s;
    box-shadow:0 10px 24px -12px rgba(184,134,11,.7)}
  .next:hover{filter:brightness(1.04)}
  .next:disabled{background:#edeef0;color:#aeb4be;box-shadow:none;cursor:not-allowed}

  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0 0}
  .hero .kick{font:600 12px Inter;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:20px;
    display:flex;align-items:center;gap:12px}
  .hero .kick::before{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  .hero h1{font:400 clamp(34px,8.5vw,56px)/1.07 var(--serif);letter-spacing:0;margin-bottom:24px}
  .hero p{font:400 17px/1.7 Inter;color:#4a4651;max-width:560px;margin-bottom:32px}
  .herorow{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .start{background:var(--btn);color:#2a1f08;border:none;font:700 16px Inter;padding:17px 40px;
    border-radius:36px;cursor:pointer;box-shadow:0 12px 28px -12px rgba(184,134,11,.75);transition:.18s}
  .start:hover{filter:brightness(1.04)}
  .hint{font:500 12px Inter;letter-spacing:1px;text-transform:uppercase;color:#b3b0ba}

  .thanks{flex:1;min-height:calc(100dvh - 120px);position:relative;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px 8px;overflow:hidden}
  .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--serif);
    font-size:clamp(60px,16vw,150px);line-height:1;color:var(--ink);opacity:.04;letter-spacing:1px;
    white-space:nowrap;pointer-events:none;z-index:0;max-width:100%}
  .thanks>*{position:relative;z-index:1}
  .thanks .eyebrow{justify-content:center;margin-bottom:22px}
  .thanks .eyebrow::after{content:"";width:28px;height:1.5px;background:var(--grad);border-radius:2px}
  .thanks h1{font:400 clamp(38px,7.5vw,60px)/1.06 var(--serif);letter-spacing:0;margin:0 0 24px;max-width:680px}
  .thanks p{font:400 clamp(16px,2.4vw,17px)/1.7 Inter;color:#4a4651;max-width:540px;margin:0 auto 32px}
  .thanks .ty-end{font:400 clamp(30px,5.5vw,38px) var(--serif);font-style:italic;display:inline-block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
</style>
</head>
<body>
  <header class="brand" id="brand">
    <img src="https://i.imgur.com/1x7C3Vr.png" alt="Escola do Dólar" class="brandlogo" onerror="this.style.display='none';document.getElementById('bf').style.display='inline-block'">
    <span id="bf" class="logofallback" style="display:none">Escola do Dólar</span>
  </header>
  <main class="wrap" id="app"></main>

<script>
const FASE="fase2", FORMULARIO="briefing_logo";
const WEBHOOK="https://webhook.allmaticbrasil.com/webhook/lojaexclusiva";

/* Identidade vem da URL (ex: ?nome=Maria&email=maria@x.com&whatsapp=27998233325) */
const Q=new URLSearchParams(location.search);
function qp(){for(const k of arguments){const v=Q.get(k);if(v)return v;}return "";}

const TEM_LOGO_SIM="Já tenho a minha logo";
const TEM_LOGO_NAO="Quero que a equipe crie pra mim";

const STEPS=[
  {key:"nome_loja",n:1,type:"text",eyebrow:"Sua logo · 1 de 6",title:'{n}, como sua loja vai <span class="b ital">se chamar</span>?',sub:"Pode mudar depois. De 3 a 30 letras.",placeholder:"Ex: Vitalle Co."},
  {key:"tem_logo",n:2,type:"single",eyebrow:"Sua logo · 2 de 6",title:'Você já tem uma <span class="b ital">logo pronta</span>?',sub:"Vai mandar a sua ou quer que a equipe crie?",
    options:[TEM_LOGO_SIM,TEM_LOGO_NAO]},
  {key:"logo",n:3,type:"file",eyebrow:"Sua logo",title:'Beleza! É só <span class="b ital">subir a sua</span>.',sub:"Toque pra escolher o arquivo da sua logo (PNG ou JPG, de preferência com fundo transparente). Máx 4 MB.",cond:a=>a.tem_logo===TEM_LOGO_SIM,optional:true},
  {key:"estilo",n:4,type:"single",eyebrow:"Sua logo · 3 de 6",title:'Qual <span class="b ital">estilo</span> combina mais com sua loja?',sub:"Escolha o que mais tem a ver com você.",cond:a=>a.tem_logo===TEM_LOGO_NAO,
    options:["Elegante — sofisticado, atemporal","Moderno — clean, com ar tech","Natural — orgânico, terroso","Jovem — colorido, animado","Profissional — confiável, sério","Minimalista — direto ao ponto"]},
  {key:"cor",n:5,type:"single",eyebrow:"Sua logo · 4 de 6",title:'Qual <span class="b ital">cor principal</span> você quer?',sub:"Pode escolher uma ou deixar com a equipe.",cond:a=>a.tem_logo===TEM_LOGO_NAO,
    options:["🔵 Azul","⚫ Preto & dourado","🟢 Verde","🔴 Vermelho","🟣 Roxo","🟡 Dourado / amarelo","Pode escolher pela equipe"]},
  {key:"conta_mais",n:6,type:"textarea",eyebrow:"Sua logo · 5 de 6",title:'Quer contar <span class="b ital">mais alguma coisa</span> sobre a marca?',sub:"Algo que faça sentido pra você: uma referência, uma frase, um sentimento. Pode pular.",placeholder:"Ex: quero algo que passe confiança e leveza.",optional:true,cond:a=>a.tem_logo===TEM_LOGO_NAO},
  {key:"sensacao",n:7,type:"multi",max:2,eyebrow:"Sua logo · 6 de 6",title:'Qual <span class="b ital">sensação</span> sua marca deve passar?',sub:"Escolha até 2.",cond:a=>a.tem_logo===TEM_LOGO_NAO,
    options:["Confiança","Autoridade","Sofisticação","Energia","Proximidade","Exclusividade","Inovação","Resultado"]}
];

const app=document.getElementById("app");
const ans={
  _id:(self.crypto&&crypto.randomUUID?crypto.randomUUID():"lead_"+Date.now()+"_"+Math.random().toString(36).slice(2,8)),
  nome:qp("nome","name","first_name","fname","primeiro_nome"),
  email:qp("email","mail","e-mail"),
  whatsapp:qp("whatsapp","telefone","phone","wpp","celular","tel","fone"),
  ddi:qp("ddi")||"+55"
};
let i=-1, leadEnviado=false;

function seq(){ return STEPS.filter(s=>!s.cond||s.cond(ans)); }

function buildPayload(step,status){
  return {
    id:ans._id, fase:FASE, formulario:FORMULARIO, step:step, status:status,
    nome:ans.nome||"", email:(ans.email||"").trim(), whatsapp:ans.whatsapp||"", ddi:ans.ddi||"",
    respostas:{
      nome_loja:ans.nome_loja||null, tem_logo:ans.tem_logo||null,
      logo_arquivo:ans.logo_nome||null, logo_mime:ans.logo_mime||null, logo_base64:ans.logo_b64||null,
      estilo:ans.estilo||null, cor:ans.cor||null, conta_mais:ans.conta_mais||null, sensacao:ans.sensacao||null
    },
    atualizado_em:new Date().toISOString()
  };
}
function sendWebhook(step,status){
  try{
    const body=JSON.stringify(buildPayload(step,status));
    const opt={method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=UTF-8"},body};
    if(body.length<60000) opt.keepalive=true;
    fetch(WEBHOOK,opt);
  }catch(e){}
}

function firstName(){ return (ans.nome||"").trim().split(/\s+/)[0]||""; }
function tok(s){ if(!s) return s; const n=firstName();
  if(n) return s.replace(/\{n\}/g,n);
  return s.replace(/,?\s*\{n\}\s*,?/g," ").replace(/\s{2,}/g," ").replace(/\s+([.!?—])/g,"$1").trim(); }

function valid(step){
  if(step.optional||step.type==="info"||step.type==="file") return true;
  const v=ans[step.key];
  if(step.type==="multi") return Array.isArray(v)&&v.length>0;
  if(step.type==="single") return !!v;
  return (v||"").trim().length>1;
}

function render(){
  const list=seq();
  const hdr=document.getElementById('brand'); if(hdr) hdr.style.display=(i===-1?'flex':'none');
  if(i===-1){renderWelcome();return}
  if(i>=list.length){renderFinal();return}
  const s=list[i];
  const dots=list.map((_,k)=>`<span class="dot ${k<i?'done':''} ${k===i?'cur':''}"></span>`).join("");
  const count=`${i+1} / ${list.length}`;
  let bodyHTML="";
  if(s.type==="file"){
    const has=!!ans.logo_b64;
    bodyHTML=`<input type="file" id="filein" accept="image/*" style="display:none">
      <button type="button" class="uploadbtn" id="uploadbtn">📎 ${has?'Trocar imagem':'Escolher imagem da logo'}</button>
      <div class="upinfo" id="upinfo">${has?`<img class="upthumb" src="${ans.logo_b64}"><span class="upname">${ans.logo_nome}<span class="upok">✓ Anexada</span></span>`:''}</div>`;
  } else if(["text"].includes(s.type)){
    bodyHTML=`<input class="fld" id="fld" type="text" placeholder="${s.placeholder||""}" value="${(ans[s.key]||"").replace(/"/g,'&quot;')}" autocomplete="off">`;
  } else if(s.type==="textarea"){
    bodyHTML=`<textarea class="fld" id="fld" placeholder="${s.placeholder||""}">${ans[s.key]||""}</textarea>`;
  } else {
    const sel=ans[s.key]||(s.type==="multi"?[]:null);
    bodyHTML=`<div class="opts">`+s.options.map((o,k)=>{
      const isSel=s.type==="multi"?sel.includes(o):sel===o;
      return `<button class="opt ${isSel?'sel':''}" data-multi="${s.type==='multi'?1:0}" data-o="${k}"><span class="mark"></span><span>${o}</span></button>`;
    }).join("")+`</div>`;
  }
  app.innerHTML=`
    <div class="nav">
      <button class="back" id="back">&larr; Voltar</button>
      <div class="dots">${dots}</div>
      <div class="count">${count}</div>
    </div>
    <div class="screen">
      <div class="eyebrow">${s.eyebrow}</div>
      <h1 class="q">${tok(s.title)}</h1>
      ${s.sub?`<div class="sub">${tok(s.sub)}</div>`:""}
      <div class="body">${bodyHTML}</div>
      <div class="foot">
        ${s.optional?'<button class="skip" id="skip" style="visibility:visible">Pular</button>':''}
        <button class="next" id="next">${s.nextLabel||"Próxima"}</button>
      </div>
    </div>`;
  document.getElementById("back").style.visibility="visible";
  wire(s);
}

function wire(s){
  const next=document.getElementById("next");
  const back=document.getElementById("back");
  back.onclick=()=>{i=Math.max(-1,i-1);render()};
  const skip=document.getElementById("skip"); if(skip) skip.onclick=go;
  const upd=()=>{ next.disabled=!valid(s); };
  if(s.type==="file"){
    const fi=document.getElementById("filein"), ub=document.getElementById("uploadbtn"), info=document.getElementById("upinfo");
    ub.onclick=()=>fi.click();
    fi.onchange=()=>{
      const f=fi.files[0]; if(!f) return;
      if(f.size>4*1024*1024){ info.innerHTML='<span class="uperr">Imagem muito grande (máx 4 MB). Tenta outra ou manda no WhatsApp.</span>'; return; }
      const r=new FileReader();
      r.onload=()=>{ ans.logo_b64=r.result; ans.logo_nome=f.name; ans.logo_mime=f.type;
        info.innerHTML=`<img class="upthumb" src="${r.result}"><span class="upname">${f.name}<span class="upok">✓ Anexada</span></span>`;
        ub.textContent="📎 Trocar imagem"; upd(); };
      r.readAsDataURL(f);
    };
  } else if(["text","textarea"].includes(s.type)){
    const f=document.getElementById("fld"); f.focus();
    f.oninput=()=>{ans[s.key]=f.value;upd()};
    f.onkeydown=(e)=>{if(e.key==="Enter"&&s.type!=="textarea"&&!next.disabled)go()};
  } else {
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const o=s.options[btn.dataset.o];
        if(s.type==="multi"){
          ans[s.key]=ans[s.key]||[];
          const idx=ans[s.key].indexOf(o);
          if(idx>=0){ans[s.key].splice(idx,1);btn.classList.remove("sel")}
          else{ if(s.max&&ans[s.key].length>=s.max) return; ans[s.key].push(o);btn.classList.add("sel")}
          upd();
        } else {
          ans[s.key]=o;
          app.querySelectorAll(".opt").forEach(b=>b.classList.remove("sel"));
          btn.classList.add("sel");
          upd();
          setTimeout(go,230);
        }
      };
    });
  }
  next.onclick=go; upd();
}

function go(){
  const list=seq(); const s=list[i]; if(!valid(s)) return;
  i++;
  const list2=seq();
  if(i>=list2.length) sendWebhook(s.n,"concluido");
  else sendWebhook(s.n,"em_andamento");
  render();
}

function renderWelcome(){
  app.innerHTML=`
    <div class="nav"><button class="back" style="visibility:hidden">&larr;</button><div class="dots"></div><div class="count"></div></div>
    <div class="hero">
      <div class="kick">Fase 2 · Sua logo</div>
      <h1>Hora de pensar na <span class="b ital">cara</span> da sua loja.</h1>
      <p>${firstName()?firstName()+", boa":"Boa"}! A equipe já te conhece. Agora é a <b>Fase 2</b>: um briefing rapidinho pra criar a identidade da sua loja. Você responde algumas perguntas e a equipe usa pra fazer <b>3 opções de logo</b> no seu jeito. Bora deixar sua loja com cara de marca de verdade.</p>
      <div class="herorow">
        <button class="start" id="start">Bora começar &rarr;</button>
        <span class="hint">Briefing · 2 min</span>
      </div>
    </div>`;
  document.getElementById("start").onclick=()=>{ if(!leadEnviado){sendWebhook(0,"novo_lead");leadEnviado=true;} i=0;render(); };
}

function renderFinal(){
  const n=firstName();
  app.innerHTML=`
    <div class="thanks">
      <div class="wm">Fase 2</div>
      <div class="eyebrow">Briefing enviado</div>
      <h1>Agora é com a <span class="b ital">nossa equipe</span>.</h1>
      <p>Recebemos tudo${n?", "+n:""}! O time já vai começar a desenhar a identidade da sua loja. Em breve a gente te chama no WhatsApp com as opções — e segue pra <b>Fase 3</b>, onde você organiza como vai receber em euro.</p>
      <div class="ty-end">Vem que a meta é euro!</div>
    </div>`;
}

render();
</script>
</body>
</html>
